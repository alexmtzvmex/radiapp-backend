<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RadiApp Admin</title>
</head>
<body>

<h1>Panel Admin RadiApp</h1>

<button onclick="cargarUsuarios()">Actualizar usuarios pendientes</button>

<br><br>

<div id="usuarios"></div>

<pre id="resultado"></pre>

<script>
const API = "https://radiapp-backend.onrender.com";

async function cargarUsuarios() {
    const respuesta = await fetch(API + "/api/admin/usuarios-pendientes");
    const json = await respuesta.json();

    const contenedor = document.getElementById("usuarios");
    contenedor.innerHTML = "";

    if (!json.usuarios || json.usuarios.length === 0) {
        contenedor.innerHTML = "<p>No hay usuarios pendientes.</p>";
        return;
    }

    json.usuarios.forEach(usuario => {
        const div = document.createElement("div");

        div.innerHTML = `
            <hr>
            <p><b>ID:</b> ${usuario.id}</p>
            <p><b>Nombre:</b> ${usuario.nombre_completo}</p>
            <p><b>Correo:</b> ${usuario.correo}</p>
            <p><b>Estatus:</b> ${usuario.estatus}</p>
            <button onclick="aprobarUsuario(${usuario.id})">Aprobar usuario</button>
        `;

        contenedor.appendChild(div);
    });
}

async function aprobarUsuario(id) {
    const respuesta = await fetch(API + "/api/admin/aprobar/" + id, {
        method: "PUT"
    });

    const json = await respuesta.json();

    document.getElementById("resultado").innerText =
        JSON.stringify(json, null, 2);

    cargarUsuarios();
}

cargarUsuarios();
</script>

</body>
</html>
