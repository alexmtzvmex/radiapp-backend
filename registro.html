<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiApp Registro</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">

<meta name="theme-color" content="#020817">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

html{
    background:#020817;
}

body{
    background:#020817;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    color:white;
}

body::before{
    content:"";
    position:absolute;
    inset:-25%;
    background:
        radial-gradient(circle at 50% 25%, rgba(92,242,214,0.18) 0%, transparent 28%),
        radial-gradient(circle at 50% 55%, rgba(92,242,214,0.09) 0%, transparent 42%),
        radial-gradient(circle at 10% 88%, rgba(92,242,214,0.16) 0%, transparent 26%),
        radial-gradient(circle at 90% 88%, rgba(92,242,214,0.14) 0%, transparent 28%);
    filter:blur(2px);
}

body::after{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(transparent 0%, rgba(2,8,23,.42) 54%, #020817 100%),
        repeating-radial-gradient(circle at 50% 72%, rgba(92,242,214,.14) 0 1px, transparent 1px 23px);
    opacity:.48;
    pointer-events:none;
}

.bg-rings{
    position:absolute;
    width:980px;
    height:980px;
    border-radius:50%;
    border:1px solid rgba(92,242,214,.08);
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:
        0 0 0 72px rgba(92,242,214,.035),
        0 0 0 145px rgba(92,242,214,.025),
        0 0 0 230px rgba(92,242,214,.016);
    pointer-events:none;
    z-index:1;
}

.container{
    width:100%;
    max-width:720px;
    padding:20px 22px;
    position:relative;
    z-index:2;
}

.logo{
    text-align:center;
    margin-bottom:24px;
}

.logo img{
    width:520px;
    max-width:96%;
    display:block;
    margin:0 auto;
    background:transparent;
    filter:
        drop-shadow(0 0 24px rgba(92,242,214,.24))
        drop-shadow(0 0 60px rgba(92,242,214,.12));
}

.card{
    background:linear-gradient(180deg, rgba(16,28,49,.76), rgba(5,13,28,.82));
    border:1px solid rgba(92,242,214,.34);
    border-radius:34px;
    padding:38px 42px;
    backdrop-filter:blur(24px);
    box-shadow:
        inset 0 1px 0 rgba(255,255,255,.05),
        0 0 55px rgba(92,242,214,.10),
        0 28px 90px rgba(0,0,0,.58);
}

.card h1{
    text-align:center;
    margin-bottom:8px;
    font-size:38px;
    font-weight:800;
    letter-spacing:.3px;
    color:#f8fafc;
    text-shadow:0 3px 18px rgba(0,0,0,.55);
}

.subtitle{
    text-align:center;
    color:#a7adba;
    font-size:15px;
    line-height:1.35;
    margin-bottom:18px;
}

.line{
    width:68px;
    height:4px;
    background:#5CF2D6;
    margin:14px auto 28px;
    border-radius:10px;
    box-shadow:0 0 16px rgba(92,242,214,.95);
}

.input-group{
    margin-bottom:16px;
    position:relative;
}

.input-icon{
    position:absolute;
    left:22px;
    top:50%;
    transform:translateY(-50%);
    width:28px;
    height:28px;
    color:#5CF2D6;
    filter:drop-shadow(0 0 8px rgba(92,242,214,.35));
}

.input-group input{
    width:100%;
    padding:19px 62px 19px 74px;
    border-radius:17px;
    background:rgba(4,13,29,.50);
    color:white;
    font-size:18px;
    outline:none;
    border:1px solid rgba(148,163,184,.30);
    box-shadow:inset 0 0 18px rgba(0,0,0,.16);
}

.input-group input:focus{
    border-color:rgba(92,242,214,.78);
    box-shadow:
        0 0 0 3px rgba(92,242,214,.13),
        inset 0 0 18px rgba(0,0,0,.16);
}

.input-group input::placeholder{
    color:#a7adba;
}

.eye-btn{
    position:absolute;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    background:transparent;
    border:none;
    width:36px;
    height:36px;
    padding:0;
    margin:0;
    cursor:pointer;
    color:#e5e7eb;
    opacity:.86;
}

.eye-btn svg{
    width:100%;
    height:100%;
}

.btn{
    width:100%;
    padding:20px;
    border:none;
    border-radius:17px;
    background:linear-gradient(90deg,#64f4da 0%, #18d4c6 100%);
    color:#03111f;
    font-size:22px;
    font-weight:900;
    cursor:pointer;
    transition:.25s;
    margin-top:10px;
    box-shadow:
        0 0 26px rgba(92,242,214,.28),
        inset 0 1px 0 rgba(255,255,255,.36);
}

.btn:hover{
    transform:translateY(-1px);
    box-shadow:
        0 0 38px rgba(92,242,214,.40),
        inset 0 1px 0 rgba(255,255,255,.36);
}

.btn:active{
    transform:scale(.985);
}

.back-link{
    text-align:center;
    margin-top:22px;
    font-size:17px;
    color:#f8fafc;
}

.back-link a{
    color:#5CF2D6;
    text-decoration:underline;
    text-underline-offset:4px;
    margin-left:6px;
}

.msg{
    margin-top:18px;
    text-align:center;
    color:#5CF2D6;
    min-height:22px;
    white-space:pre-wrap;
    font-weight:600;
    line-height:1.35;
}

.error{
    color:#fb7185;
}

.secure-footer{
    margin-top:22px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    text-align:center;
    color:#9ca3af;
}

.secure-footer svg{
    width:34px;
    height:34px;
    color:#5CF2D6;
    filter:drop-shadow(0 0 9px rgba(92,242,214,.48));
    flex:0 0 auto;
}

.footer-text{
    display:flex;
    flex-direction:column;
    line-height:1.35;
}

.footer-main{
    color:#d1d5db;
    font-size:18px;
    font-weight:650;
    letter-spacing:.25px;
}

.footer-copy{
    color:#6b7280;
    font-size:12px;
    margin-top:2px;
}

@media(max-width:760px){
    body{
        align-items:flex-start;
        overflow:auto;
    }

    .bg-rings{
        width:720px;
        height:720px;
        top:36%;
    }

    .container{
        max-width:100%;
        padding:18px;
    }

    .logo{
        margin-top:18px;
        margin-bottom:18px;
    }

    .logo img{
        width:340px;
    }

    .card{
        padding:28px 22px;
        border-radius:26px;
    }

    .card h1{
        font-size:32px;
    }

    .input-group input{
        font-size:17px;
        padding:17px 56px 17px 64px;
    }

    .input-icon{
        left:20px;
        width:25px;
        height:25px;
    }

    .footer-main{
        font-size:15px;
    }

    .footer-copy{
        font-size:11px;
    }
}

@media(max-width:390px){
    .logo img{
        width:310px;
    }

    .card{
        padding:26px 18px;
    }

    .btn{
        font-size:20px;
    }
}
</style>
</head>

<body>

<div class="bg-rings"></div>

<div class="container">

    <div class="logo">
        <img src="Logo.png" alt="RadiApp">
    </div>

    <div class="card">

        <h1>Solicitar cuenta</h1>
        <div class="line"></div>

        <p class="subtitle">
            Tu solicitud será enviada al administrador para autorización.
        </p>

        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
                <path d="M4 21c1.4-4 4.2-6 8-6s6.6 2 8 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input id="nombre" type="text" placeholder="Nombre completo" autocomplete="name">
        </div>

        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16v12H4V6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input id="correo" type="email" placeholder="Correo" autocomplete="email">
        </div>

        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none">
                <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M6 10h12v10H6V10Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M12 14v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>

            <input id="password" type="password" placeholder="Contraseña" autocomplete="new-password">

            <button class="eye-btn" type="button" onclick="togglePassword('password')" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
        </div>

        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none">
                <path d="M9 12.5 11 14.5 15.5 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M6 10h12v10H6V10Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>

            <input id="confirmar" type="password" placeholder="Confirmar contraseña" autocomplete="new-password">

            <button class="eye-btn" type="button" onclick="togglePassword('confirmar')" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
        </div>

        <button class="btn" onclick="registrar()">
            Enviar solicitud
        </button>

        <div class="back-link">
            ¿Ya tienes cuenta?
            <a href="login.html">Inicia sesión</a>
        </div>

        <div id="mensaje" class="msg"></div>

    </div>

    <div class="secure-footer">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 3 5 6v5c0 4.5 2.9 8.7 7 10 4.1-1.3 7-5.5 7-10V6l-7-3Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"/>
            <path d="M9 12h6v5H9v-5Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"/>
            <path d="M10 12v-1a2 2 0 0 1 4 0v1"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"/>
        </svg>

        <div class="footer-text">
            <span class="footer-main">RadiApp · Conexión segura</span>
            <span class="footer-copy">© 2025 - 2026 RadiApp · Todos los derechos reservados</span>
        </div>
    </div>

</div>

<script>
const API = "https://radiapp-backend.onrender.com";

function togglePassword(id){
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
}

async function registrar(){
    const nombre_completo = document.getElementById("nombre").value.trim();
    const correo = document.getElementById("correo").value.trim();
    const password = document.getElementById("password").value;
    const confirmar = document.getElementById("confirmar").value;

    const msg = document.getElementById("mensaje");
    msg.className = "msg";
    msg.innerText = "Enviando solicitud...";

    if(!nombre_completo || !correo || !password || !confirmar){
        msg.className = "msg error";
        msg.innerText = "Completa todos los campos.";
        return;
    }

    if(password.length < 6){
        msg.className = "msg error";
        msg.innerText = "La contraseña debe tener mínimo 6 caracteres.";
        return;
    }

    if(password !== confirmar){
        msg.className = "msg error";
        msg.innerText = "Las contraseñas no coinciden.";
        return;
    }

    try{
        const res = await fetch(API + "/api/auth/register", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({
                nombre_completo,
                correo,
                password
            })
        });

        const json = await res.json();

        if(json.success){
            msg.className = "msg";
            msg.innerText = json.message || "Solicitud enviada correctamente. Espera autorización del administrador.";

            document.getElementById("nombre").value = "";
            document.getElementById("correo").value = "";
            document.getElementById("password").value = "";
            document.getElementById("confirmar").value = "";
        }else{
            msg.className = "msg error";
            msg.innerText = json.error || "No se pudo enviar la solicitud.";
        }

    }catch(error){
        msg.className = "msg error";
        msg.innerText = "Error de conexión con el servidor.";
    }
}

document.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
        registrar();
    }
});

if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
