<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RadiApp LIVE</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

</head>
<body>

<h1>RadiApp LIVE</h1>

<input type="text" id="usuario" placeholder="Tu nombre"><br><br>

<input type="number" id="canal" value="1"><br><br>

<button onclick="activarMicrofono()">
1. Activar micrófono
</button>

<button onclick="entrarCanal()">
2. Entrar al canal
</button>

<hr>

<button
id="btnPTT"
style="
width:220px;
height:220px;
border-radius:110px;
background:red;
color:white;
font-size:42px;
"
>
PTT
</button>

<h2 id="estado">Desconectado</h2>

<div id="mensajes"></div>

<script>

const socket = io("https://radiapp-backend.onrender.com");

let stream = null;
let mediaRecorder = null;
let grabando = false;

const btnPTT = document.getElementById("btnPTT");

btnPTT.addEventListener("pointerdown", iniciarPTT);
btnPTT.addEventListener("pointerup", detenerPTT);
btnPTT.addEventListener("pointercancel", detenerPTT);
btnPTT.addEventListener("pointerleave", detenerPTT);

async function activarMicrofono() {

    try {

        stream = await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        estado("Micrófono activado");

    } catch(error) {

        alert("Error micrófono: " + error.message);

    }

}

function entrarCanal() {

    socket.emit("entrar_canal", {
        canal_id: getCanal(),
        usuario: getUsuario()
    });

    estado("Conectado al canal " + getCanal());

}

async function iniciarPTT(event) {

    event.preventDefault();

    if(grabando) return;

    if(!stream) {
        await activarMicrofono();
    }

    if(!stream) return;

    grabando = true;

    btnPTT.style.background = "green";

    mediaRecorder = new MediaRecorder(stream, {
        mimeType: "audio/webm"
    });

    mediaRecorder.ondataavailable = async function(event) {

        if(event.data.size > 0) {

            const reader = new FileReader();

            reader.onloadend = function() {

                const base64Audio =
                    reader.result.split(",")[1];

                socket.emit("audio_chunk", {
                    canal_id: getCanal(),
                    usuario: getUsuario(),
                    audio: base64Audio
                });

            };

            reader.readAsDataURL(event.data);

        }

    };

    mediaRecorder.start(300);

    socket.emit("ptt_inicio", {
        canal_id: getCanal(),
        usuario: getUsuario()
    });

    estado(getUsuario() + " está hablando...");

}

function detenerPTT(event) {

    if(event) event.preventDefault();

    if(!grabando) return;

    grabando = false;

    btnPTT.style.background = "red";

    if(mediaRecorder &&
       mediaRecorder.state === "recording") {

        mediaRecorder.stop();

    }

    socket.emit("ptt_fin", {
        canal_id: getCanal(),
        usuario: getUsuario()
    });

    estado(getUsuario() + " dejó de hablar.");

}

socket.on("mensaje_canal", function(data) {

    mensaje(data.mensaje);

});

socket.on("ptt_estado", function(data) {

    estado(data.mensaje);

});

socket.on("audio_chunk", function(data) {

    const audio = new Audio(
        "data:audio/webm;base64," + data.audio
    );

    audio.play().catch(function(error) {

        console.log(error);

    });

});

function getUsuario() {

    return document.getElementById("usuario").value || "Usuario";

}

function getCanal() {

    return document.getElementById("canal").value || "1";

}

function estado(texto) {

    document.getElementById("estado").innerText = texto;

}

function mensaje(texto) {

    document.getElementById("mensajes").innerHTML +=
        "<p>" + texto + "</p>";

}

</script>

</body>
</html>
