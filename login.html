<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiApp Login</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#020817;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    color:white;
}

body::before{
    content:"";
    position:absolute;
    inset:-25%;
    background:
        radial-gradient(circle at 50% 35%, rgba(92,242,214,0.16) 0%, transparent 34%),
        radial-gradient(circle at 15% 85%, rgba(92,242,214,0.12) 0%, transparent 28%),
        radial-gradient(circle at 90% 90%, rgba(92,242,214,0.10) 0%, transparent 30%);
    filter:blur(2px);
}

body::after{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(transparent 0%, rgba(2,8,23,.50) 55%, #020817 100%),
        repeating-radial-gradient(circle at 50% 70%, rgba(92,242,214,.14) 0 1px, transparent 1px 22px);
    opacity:.45;
    pointer-events:none;
}

.container{
    width:100%;
    max-width:620px;
    padding:22px;
    position:relative;
    z-index:2;
}

.logo{
    text-align:center;
    margin-bottom:32px;
}

.logo img{
    width:430px;
    max-width:96%;
    filter:drop-shadow(0 0 22px rgba(92,242,214,.18));
}

.card{
    background:rgba(15,23,42,0.58);
    border:1px solid rgba(148,163,184,0.28);
    border-radius:28px;
    padding:38px;
    backdrop-filter:blur(18px);
    box-shadow:
        0 0 45px rgba(92,242,214,0.08),
        0 24px 80px rgba(0,0,0,.45);
}

.card h1{
    text-align:center;
    margin-bottom:10px;
    font-size:40px;
    font-weight:800;
    letter-spacing:.3px;
}

.line{
    width:64px;
    height:4px;
    background:#5CF2D6;
    margin:14px auto 30px;
    border-radius:10px;
    box-shadow:0 0 14px rgba(92,242,214,.9);
}

.input-group{
    margin-bottom:20px;
    position:relative;
}

.input-icon{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    width:25px;
    height:25px;
    opacity:.78;
    color:#d1d5db;
}

.input-group input{
    width:100%;
    padding:19px 55px 19px 62px;
    border-radius:16px;
    background:rgba(15,23,42,0.55);
    color:white;
    font-size:18px;
    outline:none;
    border:1px solid rgba(148,163,184,0.25);
}

.input-group input:focus{
    border-color:rgba(92,242,214,.70);
    box-shadow:0 0 0 3px rgba(92,242,214,.12);
}

.input-group input::placeholder{
    color:#9ca3af;
}

.eye-btn{
    position:absolute;
    right:17px;
    top:50%;
    transform:translateY(-50%);
    background:transparent;
    border:none;
    width:34px;
    height:34px;
    padding:0;
    margin:0;
    cursor:pointer;
    color:#d1d5db;
    opacity:.78;
}

.btn{
    width:100%;
    padding:19px;
    border:none;
    border-radius:16px;
    background:linear-gradient(90deg,#5CF2D6,#35d0bd);
    color:#03111f;
    font-size:22px;
    font-weight:800;
    cursor:pointer;
    transition:.25s;
    margin-top:8px;
    box-shadow:0 0 22px rgba(92,242,214,.22);
}

.btn:hover{
    transform:translateY(-1px);
    box-shadow:0 0 32px rgba(92,242,214,.34);
}

.btn:active{
    transform:scale(.98);
}

.separator{
    display:flex;
    align-items:center;
    margin:28px 0;
    color:#7b8494;
}

.separator::before,
.separator::after{
    content:"";
    flex:1;
    height:1px;
    background:rgba(148,163,184,.22);
}

.separator span{
    margin:0 14px;
}

.links{
    text-align:center;
    line-height:36px;
    font-size:17px;
}

.links a{
    color:#5CF2D6;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

.msg{
    margin-top:18px;
    text-align:center;
    color:#5CF2D6;
    min-height:22px;
    white-space:pre-wrap;
}

.error{
    color:#fb7185;
}


.secure-footer{
    margin-top:28px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    color:#9ca3af;
    font-size:18px;
    letter-spacing:.2px;
    text-align:center;
}

.secure-footer svg{
    width:30px;
    height:30px;
    color:#5CF2D6;
    filter:drop-shadow(0 0 8px rgba(92,242,214,.45));
}

@media(max-width:560px){
    body{
        align-items:flex-start;
        overflow:auto;
    }

    .container{
        max-width:100%;
        padding:18px;
    }

    .logo{
        margin-top:22px;
        margin-bottom:22px;
    }

    .logo img{
        width:340px;
    }

    .card{
        padding:28px 22px;
        border-radius:24px;
    }

    .card h1{
        font-size:34px;
    }

    .links{
        font-size:16px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="Logo.png" alt="RadiApp">
    </div>

    <div class="card">

        <h1>Iniciar sesión</h1>
        <div class="line"></div>

        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16v12H4V6Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="m4 7 8 6 8-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input id="correo" type="email" placeholder="Correo" autocomplete="email">
        </div>

        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none">
                <path d="M7 10V8a5 5 0 0 1 10 0v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M6 10h12v10H6V10Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                <path d="M12 14v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password">
            <button class="eye-btn" type="button" onclick="togglePassword()" aria-label="Mostrar contraseña">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
        </div>

        <button class="btn" onclick="login()">Entrar</button>

        <div class="separator">
            <span>o</span>
        </div>

        <div class="links">
            ¿Olvidaste tu contraseña?
            <a href="#" onclick="alert('Esta función la agregaremos después.'); return false;">Haz click aquí</a>
            <br>
            ¿No tienes cuenta?
            <a href="registro.html">Solicítala aquí</a>
        </div>

        <div id="mensaje" class="msg"></div>

    </div>


    <div class="secure-footer">
        <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 3 5 6v5c0 4.5 2.9 8.7 7 10 4.1-1.3 7-5.5 7-10V6l-7-3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M9 12h6v5H9v-5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="M10 12v-1a2 2 0 0 1 4 0v1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>RadiApp - Conexión segura</span>
    </div>

</div>

<script>
const API = "https://radiapp-backend.onrender.com";

function togglePassword(){
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

async function login(){
    const correo = document.getElementById("correo").value.trim();
    const password = document.getElementById("password").value;

    const msg = document.getElementById("mensaje");
    msg.className = "msg";
    msg.innerText = "Validando acceso...";

    if(!correo || !password){
        msg.className = "msg error";
        msg.innerText = "Ingresa correo y contraseña.";
        return;
    }

    try{
        const res = await fetch(API + "/api/auth/login", {
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({ correo, password })
        });

        const json = await res.json();

        if(json.success){
            localStorage.setItem("radiapp_token", json.token);
            localStorage.setItem("radiapp_user", JSON.stringify(json.usuario));

            msg.className = "msg";
            msg.innerText = "Acceso correcto. Entrando...";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 700);
        }else{
            msg.className = "msg error";
            msg.innerText = json.error || "No se pudo iniciar sesión.";
        }
    }catch(error){
        msg.className = "msg error";
        msg.innerText = "Error de conexión con el servidor.";
    }
}

document.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
        login();
    }
});

if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
