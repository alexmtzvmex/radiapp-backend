<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RadiApp Login</title>

<link rel="manifest" href="manifest.json">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#020817;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
    color:white;
}

/* Fondo animado */

body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:
    radial-gradient(circle at center,
    rgba(0,255,200,0.10) 0%,
    transparent 40%);
    animation:moveBg 10s linear infinite;
}

@keyframes moveBg{
    0%{
        transform:translate(-25%,-25%) rotate(0deg);
    }
    100%{
        transform:translate(-25%,-25%) rotate(360deg);
    }
}

.container{
    width:100%;
    max-width:450px;
    padding:20px;
    position:relative;
    z-index:2;
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    width:280px;
    max-width:90%;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:25px;
    padding:35px;
    backdrop-filter:blur(15px);
    box-shadow:0 0 40px rgba(0,255,200,0.08);
}

.card h1{
    text-align:center;
    margin-bottom:30px;
    font-size:42px;
    font-weight:bold;
}

.line{
    width:60px;
    height:4px;
    background:#5CF2D6;
    margin:12px auto 30px;
    border-radius:10px;
}

.input-group{
    margin-bottom:20px;
    position:relative;
}

.input-group input{
    width:100%;
    padding:18px 20px;
    border:none;
    border-radius:15px;
    background:rgba(255,255,255,0.05);
    color:white;
    font-size:18px;
    outline:none;
    border:1px solid rgba(255,255,255,0.08);
}

.input-group input::placeholder{
    color:#8c8c8c;
}

.btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:linear-gradient(90deg,#5CF2D6,#7DE2D1);
    color:#03111f;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.02);
}

.separator{
    display:flex;
    align-items:center;
    margin:25px 0;
    color:#777;
}

.separator::before,
.separator::after{
    content:"";
    flex:1;
    height:1px;
    background:#333;
}

.separator span{
    margin:0 10px;
}

.links{
    text-align:center;
    line-height:35px;
    font-size:18px;
}

.links a{
    color:#5CF2D6;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

@media(max-width:500px){

    .card{
        padding:25px;
    }

    .card h1{
        font-size:34px;
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="logo">
        <img src="Logo.png">
    </div>

    <div class="card">

        <h1>Iniciar sesión</h1>

        <div class="line"></div>

        <div class="input-group">
            <input type="email" placeholder="Correo">
        </div>

        <div class="input-group">
            <input type="password" placeholder="Contraseña">
        </div>

        <button class="btn">
            Entrar
        </button>

        <div class="separator">
            <span>o</span>
        </div>

        <div class="links">
            ¿Olvidaste tu contraseña?
            <a href="#">
                Haz click aquí
            </a>

            <br>

            ¿No tienes cuenta?
            <a href="#">
                Solicítala aquí
            </a>
        </div>

    </div>

</div>

</body>
</html>
