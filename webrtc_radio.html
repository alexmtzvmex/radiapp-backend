<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RadiApp</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{
    --bg:#0b1120;
    --panel:#111827;
    --panel2:#1e293b;
    --line:#334155;
    --text:#f8fafc;
    --muted:#94a3b8;
    --blue:#2563eb;
    --red:#dc2626;
    --green:#16a34a;
    --orange:#f97316;
}
*{ box-sizing:border-box; }
body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:Arial, Helvetica, sans-serif;
}
.header{
    background:#020617;
    padding:16px 18px;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
}
.header img{
    width:42px;
    height:42px;
    border-radius:10px;
}
.container{
    width:100%;
    max-width:680px;
    margin:0 auto;
    padding:18px;
}
.card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px;
    margin-bottom:16px;
    box-shadow:0 12px 30px rgba(0,0,0,.25);
}
label{
    display:block;
    color:var(--muted);
    margin-top:10px;
    font-size:14px;
}
input{
    width:100%;
    padding:14px;
    margin-top:8px;
    border:none;
    border-radius:12px;
    background:var(--panel2);
    color:var(--text);
    font-size:16px;
    outline:none;
}
.actions{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin-top:16px;
}
button{
    padding:14px 18px;
    border:none;
    border-radius:12px;
    background:var(--blue);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}
button:active{ transform:scale(.98); }
button.secondary{ background:#475569; }
.status{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    margin-top:12px;
    min-height:32px;
}
.status.free{ color:#22c55e; }
.status.busy{ color:#f97316; }
.status.error{ color:#ef4444; }
.ptt-wrap{
    display:flex;
    justify-content:center;
    padding:18px 0;
}
#ptt{
    width:245px;
    height:245px;
    border-radius:50%;
    background:var(--red);
    color:white;
    font-size:52px;
    border:4px solid rgba(255,255,255,.12);
    box-shadow:0 0 45px rgba(220,38,38,.55);
}
#ptt.talking{
    background:var(--green);
    box-shadow:0 0 50px rgba(22,163,74,.7);
}
#ptt.locked{
    background:#64748b;
    box-shadow:none;
    cursor:not-allowed;
}
.log{
    max-height:260px;
    overflow:auto;
}
.log p{
    margin:8px 0;
    padding:10px 12px;
    background:#0f172a;
    border-radius:12px;
    color:#e2e8f0;
    font-size:14px;
}
.remote-audio{
    width:100%;
    margin-top:12px;
}
.small{
    color:var(--muted);
    font-size:13px;
    text-align:center;
}
.badge{
    text-align:center;
    color:#5eead4;
    font-size:13px;
    margin-top:8px;
}
@media (min-width:560px){
    .actions{ grid-template-columns:1fr 1fr; }
}
</style>
</head>

<body>
<div class="header">
    <img src="icon.png" alt="RadiApp">
    <span>RadiApp</span>
</div>

<div class="container">

    <div class="card">
        <label>Usuario</label>
        <input id="usuario" placeholder="Tu nombre">

        <label>Canal</label>
        <input id="canal" value="1">

        <div class="actions">
            <button onclick="activar()">1. Activar micrófono</button>
            <button onclick="entrar()">2. Entrar al canal</button>
        </div>

        <button class="secondary" onclick="reiniciarEnlace()" style="width:100%; margin-top:10px;">
            Reintentar enlace de voz
        </button>

        <p class="small">
            El enlace de voz se crea automáticamente cuando otro usuario entra al mismo canal. 
            El botón de reintento queda solo como respaldo de prueba.
        </p>
        <div id="conexion" class="badge">Socket conectando...</div>
    </div>

    <div class="card">
        <div class="ptt-wrap">
            <button id="ptt">PTT</button>
        </div>

        <div id="estado" class="status">Desconectado</div>
    </div>

    <div class="card">
        <strong>Actividad</strong>
        <div id="log" class="log"></div>
    </div>

</div>

<script>
const socket = io("https://radiapp-backend.onrender.com");

let pc = null;
let localStream = null;
let canal = "1";
let audioRemoto = null;
let canalOcupado = false;
let ocupadoPor = null;
let enlaceIniciado = false;
let estoyEnCanal = false;
let candidatosPendientes = [];

window.addEventListener("load", () => {

    const userData = localStorage.getItem("radiapp_user");
    const canalData = localStorage.getItem("radiapp_canal");

    if(userData){
        try{
            const usuario = JSON.parse(userData);

            document.getElementById("usuario").value =
                usuario.nombre || usuario.correo || "";

        }catch(e){}
    }

    if(canalData){
        try{
            const canalObj = JSON.parse(canalData);

            document.getElementById("canal").value =
                canalObj.id || "1";

            log("Canal cargado: " + (canalObj.nombre_canal || canalObj.id));

        }catch(e){}
    }
});

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

const btn = document.getElementById("ptt");

btn.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    setMic(true);
});

btn.addEventListener("pointerup", (e) => {
    e.preventDefault();
    setMic(false);
});

btn.addEventListener("pointercancel", (e) => {
    e.preventDefault();
    setMic(false);
});

btn.addEventListener("pointerleave", (e) => {
    e.preventDefault();
    setMic(false);
});

socket.on("connect", () => {
    document.getElementById("conexion").innerText = "Socket conectado";
    log("Socket conectado: " + socket.id);
});

socket.on("disconnect", () => {
    document.getElementById("conexion").innerText = "Socket desconectado";
    estado("🔴 Sin conexión al servidor", "error");
});

async function activar() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        localStream.getAudioTracks().forEach(track => {
            track.enabled = false;
        });

        const desbloqueo = new Audio();
        desbloqueo.play().catch(() => {});

        estado("🟢 Micrófono listo", "free");
        log("Micrófono activado correctamente.");
    } catch (error) {
        alert("No se pudo activar el micrófono: " + error.message);
    }
}

async function entrar() {
    if (!localStream) {
        await activar();
    }

    if (!localStream) return;

    canal = document.getElementById("canal").value || "1";
    estoyEnCanal = true;

    socket.emit("entrar_canal", {
        canal_id: canal,
        usuario: getUsuario()
    });

    estado("🟢 Dentro del canal " + canal + ". Esperando enlace...", "free");
    log(getUsuario() + " entró al canal " + canal);
}

async function crearPC() {
    if (pc) return;

    pc = new RTCPeerConnection(config);

    localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
    });

    pc.ontrack = (event) => {
        log("Audio remoto recibido.");

        if (!audioRemoto) {
            audioRemoto = document.createElement("audio");
            audioRemoto.className = "remote-audio";
            audioRemoto.autoplay = true;
            audioRemoto.controls = true;
            document.querySelector(".container").appendChild(audioRemoto);
        }

        audioRemoto.srcObject = event.streams[0];

        audioRemoto.play().catch(() => {
            log("El navegador bloqueó autoplay. Presiona PLAY una vez en el reproductor.");
        });
    };

    pc.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit("webrtc_signal", {
                canal_id: canal,
                usuario: getUsuario(),
                type: "candidate",
                payload: event.candidate
            });
        }
    };

    pc.onconnectionstatechange = () => {
        log("Estado WebRTC: " + pc.connectionState);

        if (pc.connectionState === "connected") {
            estado("🟢 Enlace conectado. Mantén PTT para hablar.", "free");
        }

        if (pc.connectionState === "failed" || pc.connectionState === "disconnected") {
            estado("🔴 Enlace interrumpido. Usa Reintentar enlace.", "busy");
        }
    };
}

function cerrarPC() {
    if (pc) {
        try { pc.close(); } catch(e) {}
    }

    pc = null;
    enlaceIniciado = false;
    candidatosPendientes = [];
}

async function iniciarEnlaceVoz() {
    if (!localStream) {
        await activar();
    }

    if (!localStream) return;

    if (!estoyEnCanal) {
        log("Primero entra al canal.");
        return;
    }

    if (enlaceIniciado) {
        log("El enlace ya fue iniciado.");
        return;
    }

    enlaceIniciado = true;

    await crearPC();

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("webrtc_signal", {
        canal_id: canal,
        usuario: getUsuario(),
        type: "offer",
        payload: offer
    });

    estado("🟡 Enlace enviado. Esperando respuesta...", "busy");
    log("Oferta WebRTC enviada.");
}

async function reiniciarEnlace() {
    log("Reiniciando enlace de voz...");
    cerrarPC();
    await iniciarEnlaceVoz();
}

socket.on("usuario_entro", async (data) => {
    if (!estoyEnCanal) return;

    log(data.usuario + " entró. Creando enlace automático...");

    if (!localStream) {
        await activar();
    }

    setTimeout(async () => {
        if (!pc) {
            await iniciarEnlaceVoz();
        }
    }, 500);
});

socket.on("webrtc_signal", async (data) => {
    if (!localStream) {
        await activar();
    }

    canal = document.getElementById("canal").value || "1";

    if (data.type === "offer") {
        log("Oferta recibida de " + data.usuario);

        const hayColision =
            pc && (pc.signalingState !== "stable" || enlaceIniciado);

        if (hayColision) {
            if (socket.id && data.from && socket.id < data.from) {
                log("Colisión de oferta: se conserva la oferta local.");
                return;
            }

            cerrarPC();
            log("Colisión de oferta: se reinicia para aceptar oferta remota.");
        }

        await crearPC();
        await pc.setRemoteDescription(new RTCSessionDescription(data.payload));

        for (const c of candidatosPendientes) {
            try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e) {}
        }
        candidatosPendientes = [];

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        socket.emit("webrtc_signal", {
            canal_id: canal,
            usuario: getUsuario(),
            type: "answer",
            payload: answer
        });

        enlaceIniciado = true;
        estado("🟢 Enlace de voz respondido.", "free");
        log("Respuesta WebRTC enviada.");
    }

    if (data.type === "answer") {
        log("Respuesta recibida de " + data.usuario);

        if (pc && pc.signalingState !== "stable") {
            await pc.setRemoteDescription(new RTCSessionDescription(data.payload));

            for (const c of candidatosPendientes) {
                try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e) {}
            }
            candidatosPendientes = [];

            estado("🟢 Enlace conectado. Mantén PTT para hablar.", "free");
        }
    }

    if (data.type === "candidate") {
        try {
            if (pc && pc.remoteDescription) {
                await pc.addIceCandidate(new RTCIceCandidate(data.payload));
            } else {
                candidatosPendientes.push(data.payload);
            }
        } catch (error) {
            log("ICE pendiente/error: " + error.message);
        }
    }
});

function setMic(active) {
    if (!localStream) {
        log("Primero activa el micrófono.");
        return;
    }

    if (!pc) {
        log("Aún no hay enlace de voz. Espera o usa Reintentar enlace.");
        return;
    }

    if (active && canalOcupado && ocupadoPor !== getUsuario()) {
        log("Canal ocupado por " + ocupadoPor + ". Espera a que termine.");
        return;
    }

    localStream.getAudioTracks().forEach(track => {
        track.enabled = active;
    });

    btn.classList.toggle("talking", active);

    socket.emit(active ? "ptt_inicio" : "ptt_fin", {
        canal_id: canal,
        usuario: getUsuario()
    });

    estado(active ? "🟢 " + getUsuario() + " hablando..." : "🟢 Canal libre", "free");
}

socket.on("canal_ocupado", (data) => {
    canalOcupado = !!data.ocupado;
    ocupadoPor = data.usuario || null;

    if (canalOcupado && ocupadoPor !== getUsuario()) {
        btn.classList.add("locked");
        estado("🔴 Hablando: " + ocupadoPor, "busy");
    } else {
        btn.classList.remove("locked");
        estado("🟢 Canal libre", "free");
    }
});

socket.on("mensaje_canal", (data) => {
    log(data.mensaje);
});

socket.on("ptt_estado", (data) => {
    log(data.mensaje);
});

function getUsuario() {

    const local = localStorage.getItem("radiapp_user");

    if(local){
        try{
            const user = JSON.parse(local);

            if(user.nombre){
                return user.nombre;
            }

            if(user.correo){
                return user.correo;
            }

        }catch(e){}
    }

    return document.getElementById("usuario").value || "Usuario";
}

function estado(texto, tipo) {
    const el = document.getElementById("estado");
    el.innerText = texto;
    el.className = "status " + (tipo || "");
}

function log(texto) {
    const logEl = document.getElementById("log");
    logEl.innerHTML += "<p>" + texto + "</p>";
    logEl.scrollTop = logEl.scrollHeight;
}
</script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>
</body>
</html>
