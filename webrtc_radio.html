<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RadiApp WebRTC Auto</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>

<h1>RadiApp WebRTC Auto</h1>

<input id="usuario" placeholder="Tu nombre"><br><br>
<input id="canal" value="1"><br><br>

<button onclick="activar()">1. Activar micrófono y audio</button>
<button onclick="entrar()">2. Entrar al canal</button>

<hr>

<button id="ptt" style="width:220px;height:220px;border-radius:110px;background:red;color:white;font-size:40px;">
PTT
</button>

<h2 id="estado">Desconectado</h2>
<div id="log"></div>

<script>
const socket = io("https://radiapp-backend.onrender.com");

let pc = null;
let localStream = null;
let canal = "1";
let llamadaIniciada = false;
let audioRemoto = null;

const config = {
    iceServers: [
        { urls: "stun:stun.l.google.com:19302" }
    ]
};

const btn = document.getElementById("ptt");

btn.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    setMic(true);
});

btn.addEventListener("pointerup", (e) => {
    e.preventDefault();
    setMic(false);
});

btn.addEventListener("pointercancel", (e) => {
    e.preventDefault();
    setMic(false);
});

btn.addEventListener("pointerleave", (e) => {
    e.preventDefault();
    setMic(false);
});

socket.on("connect", () => {
    log("Socket conectado: " + socket.id);
});

async function activar() {
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

        // El micrófono queda cerrado hasta presionar PTT
        localStream.getAudioTracks().forEach(track => {
            track.enabled = false;
        });

        // Desbloqueo de audio del navegador
        const a = new Audio();
        a.play().catch(() => {});

        estado("Micrófono listo. Audio desbloqueado.");
        log("Micrófono activado correctamente.");
    } catch (error) {
        alert("No se pudo activar el micrófono: " + error.message);
    }
}

async function entrar() {
    if (!localStream) {
        await activar();
    }

    canal = document.getElementById("canal").value || "1";

    socket.emit("entrar_canal", {
        canal_id: canal,
        usuario: getUsuario()
    });

    estado("Dentro del canal " + canal);
    log(getUsuario() + " entró al canal " + canal);

    // Autoenlace: después de entrar al canal intenta crear el enlace de voz.
    // Si el otro usuario también lo intenta, el manejo de colisión evita que se rompa.
    setTimeout(() => {
        iniciarEnlaceVoz();
    }, 700);
}

async function crearPC() {
    if (pc) {
        return;
    }

    pc = new RTCPeerConnection(config);

    localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
    });

    pc.ontrack = (event) => {
        log("Audio remoto recibido.");

        if (!audioRemoto) {
            audioRemoto = document.createElement("audio");
            audioRemoto.autoplay = true;
            audioRemoto.controls = true;
            document.body.appendChild(audioRemoto);
        }

        audioRemoto.srcObject = event.streams[0];

        audioRemoto.play().catch(() => {
            log("El navegador bloqueó autoplay. Presiona PLAY una vez en el reproductor.");
        });
    };

    pc.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit("webrtc_signal", {
                canal_id: canal,
                usuario: getUsuario(),
                type: "candidate",
                payload: event.candidate
            });
        }
    };

    pc.onconnectionstatechange = () => {
        log("Estado WebRTC: " + pc.connectionState);

        if (pc.connectionState === "connected") {
            estado("Enlace de voz conectado. Mantén PTT para hablar.");
        }

        if (pc.connectionState === "failed" || pc.connectionState === "disconnected") {
            log("Conexión WebRTC interrumpida.");
        }
    };
}

async function iniciarEnlaceVoz() {
    if (!localStream) {
        await activar();
    }

    if (llamadaIniciada) {
        return;
    }

    llamadaIniciada = true;

    await crearPC();

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("webrtc_signal", {
        canal_id: canal,
        usuario: getUsuario(),
        type: "offer",
        payload: offer
    });

    estado("Enlace de voz enviado. Esperando respuesta...");
    log("Oferta WebRTC enviada.");
}
socket.on("usuario_entro", async (data) => {
    log(data.usuario + " entró, creando enlace automático...");

    if (!localStream) {
        await activar();
    }

    if (!pc) {
        await llamar();
    }
});
socket.on("webrtc_signal", async (data) => {
    if (!localStream) {
        await activar();
    }

    canal = document.getElementById("canal").value || "1";

    if (data.type === "offer") {
        log("Oferta recibida de " + data.usuario);

        const hayColision =
            pc &&
            (pc.signalingState !== "stable" || llamadaIniciada);

        if (hayColision) {
            // Manejo simple de colisión:
            // el socket con ID mayor reinicia y acepta la oferta; el menor conserva su oferta.
            if (socket.id && data.from && socket.id < data.from) {
                log("Colisión de oferta: se conserva la oferta local.");
                return;
            }

            try {
                pc.close();
            } catch (e) {}

            pc = null;
            llamadaIniciada = false;
            log("Colisión de oferta: se reinicia para aceptar oferta remota.");
        }

        await crearPC();

        await pc.setRemoteDescription(new RTCSessionDescription(data.payload));

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        socket.emit("webrtc_signal", {
            canal_id: canal,
            usuario: getUsuario(),
            type: "answer",
            payload: answer
        });

        estado("Enlace de voz respondido.");
        log("Respuesta WebRTC enviada.");
    }

    if (data.type === "answer") {
        log("Respuesta recibida de " + data.usuario);

        if (pc && pc.signalingState !== "stable") {
            await pc.setRemoteDescription(new RTCSessionDescription(data.payload));
            estado("Enlace de voz conectado. Mantén PTT para hablar.");
        }
    }

    if (data.type === "candidate") {
        try {
            if (pc && data.payload) {
                await pc.addIceCandidate(new RTCIceCandidate(data.payload));
            }
        } catch (error) {
            log("ICE pendiente/error: " + error.message);
        }
    }
});

function setMic(active) {
    if (!localStream) {
        log("Primero activa el micrófono.");
        return;
    }

    localStream.getAudioTracks().forEach(track => {
        track.enabled = active;
    });

    btn.style.background = active ? "green" : "red";

    socket.emit(active ? "ptt_inicio" : "ptt_fin", {
        canal_id: canal,
        usuario: getUsuario()
    });

    estado(active ? getUsuario() + " hablando..." : "Micrófono cerrado");
}

socket.on("mensaje_canal", (data) => {
    log(data.mensaje);
});

socket.on("ptt_estado", (data) => {
    estado(data.mensaje);
});

function getUsuario() {
    return document.getElementById("usuario").value || "Usuario";
}

function estado(texto) {
    document.getElementById("estado").innerText = texto;
}

function log(texto) {
    document.getElementById("log").innerHTML += "<p>" + texto + "</p>";
}

</script>

</body>
</html>
