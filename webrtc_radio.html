<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RadiApp WebRTC Test</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<h1>RadiApp WebRTC Test</h1>

<input id="usuario" placeholder="Tu nombre"><br><br>
<input id="canal" value="1"><br><br>

<button onclick="activar()">1. Activar micrófono y audio</button>
<button onclick="entrar()">2. Entrar al canal</button>
<button onclick="llamar()">3. Iniciar enlace de voz</button>

<hr>

<button id="ptt" style="width:220px;height:220px;border-radius:110px;background:red;color:white;font-size:40px;">
PTT
</button>

<h2 id="estado">Desconectado</h2>
<div id="log"></div>

<script>
const socket = io("https://radiapp-backend.onrender.com");

let pc = null;
let localStream = null;
let canal = "1";

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

const btn = document.getElementById("ptt");

btn.addEventListener("pointerdown", () => setMic(true));
btn.addEventListener("pointerup", () => setMic(false));
btn.addEventListener("pointercancel", () => setMic(false));
btn.addEventListener("pointerleave", () => setMic(false));

async function activar() {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });

    localStream.getAudioTracks().forEach(t => t.enabled = false);

    const a = new Audio();
    a.play().catch(() => {});

    estado("Micrófono listo. Audio desbloqueado.");
}

function entrar() {
    canal = document.getElementById("canal").value || "1";

    socket.emit("entrar_canal", {
        canal_id: canal,
        usuario: getUsuario()
    });

    estado("Dentro del canal " + canal);
}

async function crearPC() {
    pc = new RTCPeerConnection(config);

    localStream.getTracks().forEach(track => {
        pc.addTrack(track, localStream);
    });

    pc.ontrack = (event) => {
        log("Audio remoto recibido");
        const audio = document.createElement("audio");
        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        audio.controls = true;
        document.body.appendChild(audio);

        audio.play().catch(() => {
            log("Toca PLAY si el navegador bloquea el audio.");
        });
    };

    pc.onicecandidate = (event) => {
        if (event.candidate) {
            socket.emit("webrtc_signal", {
                canal_id: canal,
                usuario: getUsuario(),
                type: "candidate",
                payload: event.candidate
            });
        }
    };
}

async function llamar() {
    if (!localStream) {
        alert("Primero activa el micrófono");
        return;
    }

    await crearPC();

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    socket.emit("webrtc_signal", {
        canal_id: canal,
        usuario: getUsuario(),
        type: "offer",
        payload: offer
    });

    estado("Enlace enviado. Esperando respuesta...");
}

socket.on("webrtc_signal", async (data) => {
    if (!localStream) {
        await activar();
    }

    if (data.type === "offer") {
        log("Oferta recibida de " + data.usuario);

        await crearPC();

        await pc.setRemoteDescription(new RTCSessionDescription(data.payload));

        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);

        socket.emit("webrtc_signal", {
            canal_id: canal,
            usuario: getUsuario(),
            type: "answer",
            payload: answer
        });

        estado("Enlace de voz respondido");
    }

    if (data.type === "answer") {
        log("Respuesta recibida de " + data.usuario);

        if (pc) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.payload));
            estado("Enlace de voz conectado");
        }
    }

    if (data.type === "candidate") {
        try {
            if (pc) {
                await pc.addIceCandidate(new RTCIceCandidate(data.payload));
            }
        } catch (e) {
            log("ICE pendiente/error: " + e.message);
        }
    }
});

function setMic(active) {
    if (!localStream) return;

    localStream.getAudioTracks().forEach(t => t.enabled = active);

    btn.style.background = active ? "green" : "red";
    estado(active ? getUsuario() + " hablando..." : "Micrófono cerrado");
}

function getUsuario() {
    return document.getElementById("usuario").value || "Usuario";
}

function estado(t) {
    document.getElementById("estado").innerText = t;
}

function log(t) {
    document.getElementById("log").innerHTML += "<p>" + t + "</p>";
}
</script>

</body>
</html>
