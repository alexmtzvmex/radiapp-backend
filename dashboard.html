<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadiApp Dashboard</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icon.png">
<meta name="theme-color" content="#020817">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
html,body{min-height:100%;background:#020817;color:white}
body{padding:24px;background:radial-gradient(circle at 50% 0%,rgba(92,242,214,.12),transparent 36%),#020817}
.header{max-width:1100px;margin:0 auto 24px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.logo img{width:230px;max-width:90vw;filter:drop-shadow(0 0 22px rgba(92,242,214,.15))}
.user-box{text-align:right;color:#d1d5db}.user-box strong{color:#5CF2D6}.logout{margin-top:8px;background:#ef4444;color:white;border:none;padding:10px 18px;border-radius:12px;cursor:pointer;font-weight:bold}
.container{max-width:1100px;margin:0 auto}.card{background:linear-gradient(180deg,rgba(16,28,49,.88),rgba(5,13,28,.92));border:1px solid rgba(92,242,214,.34);border-radius:28px;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.45)}
h1{font-size:34px;margin-bottom:8px}.subtitle{color:#a7adba;margin-bottom:24px}.actions{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:24px}.btn{border:none;border-radius:14px;padding:15px 22px;font-size:16px;font-weight:900;cursor:pointer}.btn-primary{background:linear-gradient(90deg,#64f4da,#18d4c6);color:#03111f}.btn-secondary{background:rgba(255,255,255,.08);color:white;border:1px solid rgba(92,242,214,.35)}
.channels{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}.channel{background:rgba(4,13,29,.72);border:1px solid rgba(148,163,184,.25);border-radius:22px;padding:20px}.channel h3{color:#5CF2D6;margin-bottom:8px}.channel p{color:#cbd5e1;font-size:14px;min-height:38px}.channel small{display:block;color:#94a3b8;margin:12px 0}.channel button{width:100%;margin-top:10px}
.form{display:none;margin-bottom:24px;background:rgba(4,13,29,.72);border:1px solid rgba(92,242,214,.25);padding:20px;border-radius:22px}.form input,.form textarea{width:100%;margin-bottom:12px;padding:15px;border-radius:13px;border:1px solid rgba(148,163,184,.30);background:rgba(2,8,23,.75);color:white;outline:none}.form input:focus,.form textarea:focus{border-color:#5CF2D6}.msg{margin-top:16px;color:#5CF2D6;font-weight:bold}.error{color:#fb7185}.empty{color:#94a3b8;padding:20px;text-align:center}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:20;align-items:center;justify-content:center;padding:18px}.modal{width:100%;max-width:430px;background:linear-gradient(180deg,rgba(16,28,49,.98),rgba(5,13,28,.98));border:1px solid rgba(92,242,214,.35);border-radius:24px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.65)}.modal h2{margin-bottom:8px}.modal p{color:#a7adba;margin-bottom:16px}.modal input{width:100%;padding:15px;border-radius:13px;border:1px solid rgba(148,163,184,.30);background:rgba(2,8,23,.85);color:white;margin-bottom:14px}.modal-actions{display:flex;gap:10px}.modal-actions button{flex:1}
@media(max-width:700px){body{padding:16px}.header{flex-direction:column;text-align:center}.user-box{text-align:center}.logo img{width:210px}h1{font-size:28px}}
</style>
</head>
<body>
<div class="header"><div class="logo"><img src="Logo.png" alt="RadiApp"></div><div class="user-box"><div>Sesión iniciada como:</div><strong id="usuarioNombre">Usuario</strong><br><button class="logout" onclick="cerrarSesion()">Cerrar sesión</button></div></div>
<div class="container"><div class="card"><h1>Dashboard RadiApp</h1><p class="subtitle">Selecciona un canal para comunicarte por radio PTT.</p><div class="actions">

    <button class="btn btn-primary" onclick="mostrarFormulario()">
        Crear canal
    </button>

    <button class="btn btn-secondary" onclick="cargarCanales()">
        Actualizar canales
    </button>

    <button
        id="btnAdmin"
        class="btn btn-secondary"
        style="display:none;"
        onclick="window.location.href='admin.html'">
        Panel Admin
    </button><button class="btn btn-primary" onclick="mostrarFormulario()">Crear canal</button><button class="btn btn-secondary" onclick="cargarCanales()">Actualizar canales</button></div><div id="formCrear" class="form"><input id="nombre_canal" type="text" placeholder="Nombre del canal"><textarea id="descripcion" placeholder="Descripción del canal"></textarea><input id="password_canal" type="password" placeholder="Contraseña del canal"><button class="btn btn-primary" onclick="crearCanal()">Guardar canal</button></div><div id="canales" class="channels"></div><div id="mensaje" class="msg"></div></div></div>
<div id="modalPassword" class="modal-bg"><div class="modal"><h2>Contraseña del canal</h2><p id="modalCanalNombre">Ingresa la contraseña para entrar.</p><input id="modalPasswordInput" type="password" placeholder="Contraseña"><div class="modal-actions"><button class="btn btn-secondary" onclick="cerrarModalPassword()">Cancelar</button><button class="btn btn-primary" onclick="validarPasswordCanal()">Entrar</button></div><div id="modalMsg" class="msg"></div></div></div>
<script>
const API="https://radiapp-backend.onrender.com";
let usuario=null;
let canalSeleccionado=null;
function validarSesion(){const token=localStorage.getItem("radiapp_token");const userData=localStorage.getItem("radiapp_user");if(!token||!userData){window.location.href="login.html";return}usuario=JSON.parse(userData);document.getElementById("usuarioNombre").innerText=usuario.nombre||usuario.correo||"Usuario"}
function cerrarSesion(){localStorage.removeItem("radiapp_token");localStorage.removeItem("radiapp_user");localStorage.removeItem("radiapp_canal");window.location.href="login.html"}
function mostrarFormulario(){const form=document.getElementById("formCrear");form.style.display=form.style.display==="block"?"none":"block"}
async function cargarCanales(){const contenedor=document.getElementById("canales");const msg=document.getElementById("mensaje");msg.className="msg";msg.innerText="Cargando canales...";contenedor.innerHTML="";try{const res=await fetch(API+"/api/channels/listar");const json=await res.json();if(!json.success){msg.className="msg error";msg.innerText=json.error||"No se pudieron cargar los canales.";return}if(!json.canales||json.canales.length===0){msg.innerText="";contenedor.innerHTML='<div class="empty">No hay canales creados todavía.</div>';return}msg.innerText="";json.canales.forEach(canal=>{const div=document.createElement("div");div.className="channel";div.innerHTML=`<h3>${canal.nombre_canal}</h3><p>${canal.descripcion||"Sin descripción"}</p><small>Creado por: ${canal.creado_por||"Usuario"}</small><small>${canal.privado==1?"🔒 Canal privado":"🔓 Canal abierto"}</small><button class="btn btn-primary" onclick='solicitarAccesoCanal(${JSON.stringify(canal)})'>Entrar al canal</button>`;contenedor.appendChild(div)})}catch(error){msg.className="msg error";msg.innerText="Error de conexión con el servidor."}}
async function crearCanal(){const nombre_canal=document.getElementById("nombre_canal").value.trim();const descripcion=document.getElementById("descripcion").value.trim();const password_canal=document.getElementById("password_canal").value.trim();const msg=document.getElementById("mensaje");if(!nombre_canal){msg.className="msg error";msg.innerText="Escribe el nombre del canal.";return}if(!usuario||!usuario.id){cerrarSesion();return}msg.className="msg";msg.innerText="Creando canal...";try{const res=await fetch(API+"/api/channels/crear",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nombre_canal,descripcion,password_canal,creado_por:usuario.id})});const json=await res.json();if(json.success){msg.className="msg";msg.innerText="Canal creado correctamente.";document.getElementById("nombre_canal").value="";document.getElementById("descripcion").value="";document.getElementById("password_canal").value="";document.getElementById("formCrear").style.display="none";cargarCanales()}else{msg.className="msg error";msg.innerText=json.error||"No se pudo crear el canal."}}catch(error){msg.className="msg error";msg.innerText="Error de conexión con el servidor."}}
function solicitarAccesoCanal(canal){canalSeleccionado=canal;document.getElementById("modalCanalNombre").innerText="Canal: "+canal.nombre_canal;document.getElementById("modalPasswordInput").value="";document.getElementById("modalMsg").innerText="";document.getElementById("modalMsg").className="msg";document.getElementById("modalPassword").style.display="flex";setTimeout(()=>document.getElementById("modalPasswordInput").focus(),100)}
function cerrarModalPassword(){document.getElementById("modalPassword").style.display="none";canalSeleccionado=null}
async function validarPasswordCanal(){if(!canalSeleccionado)return;const password_canal=document.getElementById("modalPasswordInput").value.trim();const modalMsg=document.getElementById("modalMsg");if(!password_canal){modalMsg.className="msg error";modalMsg.innerText="Ingresa la contraseña del canal.";return}modalMsg.className="msg";modalMsg.innerText="Validando acceso...";try{const res=await fetch(API+"/api/channels/validar-acceso",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({canal_id:canalSeleccionado.id,password_canal})});const json=await res.json();if(json.success){localStorage.setItem("radiapp_canal",JSON.stringify(canalSeleccionado));window.location.href="webrtc_radio.html?canal_id="+encodeURIComponent(canalSeleccionado.id)}else{modalMsg.className="msg error";modalMsg.innerText=json.error||"Contraseña incorrecta."}}catch(error){modalMsg.className="msg error";modalMsg.innerText="Error de conexión con el servidor."}}
document.addEventListener("keydown",e=>{if(e.key==="Enter"&&document.getElementById("modalPassword").style.display==="flex"){validarPasswordCanal()}if(e.key==="Escape"){cerrarModalPassword()}});
validarSesion();cargarCanales();if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js")}
</script>
</body>
</html>
