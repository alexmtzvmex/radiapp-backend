<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RadiApp Radio</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>

<h1>RadiApp Canal General</h1>

<input type="text" id="usuario" placeholder="Tu nombre">
<br><br>

<input type="number" id="canal" value="1">
<br><br>

<button onclick="conectar()">Entrar al canal</button>

<hr>

<button
    id="btnPTT"
    onmousedown="iniciarPTT()"
    onmouseup="detenerPTT()"
    ontouchstart="iniciarPTT()"
    ontouchend="detenerPTT()"
    style="width:200px;height:200px;border-radius:100px;font-size:30px;background:red;color:white;"
>
PTT
</button>

<h2 id="estado">Desconectado</h2>

<div id="mensajes"></div>

<script>
const socket = io("https://radiapp-backend.onrender.com");

let mediaRecorder = null;
let stream = null;
let grabando = false;

function conectar() {
    const usuario = document.getElementById("usuario").value;
    const canal = document.getElementById("canal").value;

    socket.emit("entrar_canal", {
        canal_id: canal,
        usuario: usuario
    });

    document.getElementById("estado").innerText = "Conectado al canal " + canal;
}

async function iniciarPTT() {
    if (grabando) return;

    const usuario = document.getElementById("usuario").value;
    const canal = document.getElementById("canal").value;

    socket.emit("ptt_inicio", {
        canal_id: canal,
        usuario: usuario
    });

    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream, {
            mimeType: "audio/webm"
        });

        mediaRecorder.ondataavailable = async (event) => {
            if (event.data.size > 0) {
                const buffer = await event.data.arrayBuffer();
                const bytes = new Uint8Array(buffer);
                let binary = "";

                for (let i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }

                const base64Audio = btoa(binary);

                socket.emit("audio_chunk", {
                    canal_id: canal,
                    usuario: usuario,
                    audio: base64Audio
                });
            }
        };

        mediaRecorder.start(300);
        grabando = true;

        document.getElementById("estado").innerText = usuario + " está hablando...";

    } catch (error) {
        alert("No se pudo activar el micrófono: " + error.message);
    }
}

function detenerPTT() {
    if (!grabando) return;

    const usuario = document.getElementById("usuario").value;
    const canal = document.getElementById("canal").value;

    if (mediaRecorder) {
        mediaRecorder.stop();
    }

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }

    grabando = false;

    socket.emit("ptt_fin", {
        canal_id: canal,
        usuario: usuario
    });

    document.getElementById("estado").innerText = usuario + " dejó de hablar.";
}

socket.on("mensaje_canal", (data) => {
    document.getElementById("mensajes").innerHTML += `<p>${data.mensaje}</p>`;
});

socket.on("ptt_estado", (data) => {
    document.getElementById("estado").innerText = data.mensaje;
});

socket.on("audio_chunk", (data) => {
    const audio = new Audio("data:audio/webm;base64," + data.audio);
    audio.play();
});
</script>

</body>
</html>
