<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RadiApp Radio</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>

<body>

<h1>RadiApp Canal General</h1>

<input type="text" id="usuario" placeholder="Tu nombre">
<br><br>

<input type="number" id="canal" value="1">
<br><br>

<button onclick="activarMicrofono()">1. Activar micrófono</button>
<button onclick="activarAudio()">2. Activar audio</button>
<button onclick="conectar()">3. Entrar al canal</button>

<hr>

<button
    id="btnPTT"
    onmousedown="iniciarPTT(event)"
    onmouseup="detenerPTT(event)"
    ontouchstart="iniciarPTT(event)"
    ontouchend="detenerPTT(event)"
    style="width:220px;height:220px;border-radius:110px;font-size:36px;background:red;color:white;"
>
PTT
</button>

<h2 id="estado">Desconectado</h2>

<div id="mensajes"></div>

<script>
const socket = io("https://radiapp-backend.onrender.com");

let mediaRecorder = null;
let stream = null;
let grabando = false;
let audioActivo = false;

async function activarMicrofono() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        document.getElementById("estado").innerText = "Micrófono activado correctamente";
    } catch (error) {
        alert("No se pudo activar el micrófono: " + error.message);
    }
}

function activarAudio() {
    audioActivo = true;
    const audio = new Audio();
    audio.play().catch(() => {});
    document.getElementById("estado").innerText = "Audio activado";
}

function conectar() {
    const usuario = document.getElementById("usuario").value || "Usuario";
    const canal = document.getElementById("canal").value || "1";

    socket.emit("entrar_canal", {
        canal_id: canal,
        usuario: usuario
    });

    document.getElementById("estado").innerText = "Conectado al canal " + canal;
}

async function iniciarPTT(event) {
    event.preventDefault();

    if (grabando) return;

    const usuario = document.getElementById("usuario").value || "Usuario";
    const canal = document.getElementById("canal").value || "1";

    if (!stream) {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (error) {
            alert("No se pudo activar el micrófono: " + error.message);
            return;
        }
    }

    socket.emit("ptt_inicio", {
        canal_id: canal,
        usuario: usuario
    });

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = async (event) => {
        if (event.data.size > 0) {
            const reader = new FileReader();

            reader.onloadend = function() {
                const base64Audio = reader.result.split(",")[1];

                socket.emit("audio_chunk", {
                    canal_id: canal,
                    usuario: usuario,
                    audio: base64Audio
                });
            };

            reader.readAsDataURL(event.data);
        }
    };

    mediaRecorder.start(500);
    grabando = true;

    document.getElementById("estado").innerText = usuario + " está hablando...";
}

function detenerPTT(event) {
    if (event) event.preventDefault();

    if (!grabando) return;

    const usuario = document.getElementById("usuario").value || "Usuario";
    const canal = document.getElementById("canal").value || "1";

    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }

    grabando = false;

    socket.emit("ptt_fin", {
        canal_id: canal,
        usuario: usuario
    });

    document.getElementById("estado").innerText = usuario + " dejó de hablar.";
}

socket.on("mensaje_canal", (data) => {
    document.getElementById("mensajes").innerHTML += `<p>${data.mensaje}</p>`;
});

socket.on("ptt_estado", (data) => {
    document.getElementById("estado").innerText = data.mensaje;
});

socket.on("audio_chunk", (data) => {
    if (!audioActivo) {
        document.getElementById("mensajes").innerHTML +=
            `<p>Audio recibido de ${data.usuario}, pero debes presionar "Activar audio".</p>`;
        return;
    }

    const audio = new Audio("data:audio/webm;base64," + data.audio);
    audio.play().catch(error => {
        document.getElementById("mensajes").innerHTML +=
            `<p>Error reproduciendo audio: ${error.message}</p>`;
    });
});
</script>

</body>
</html>
