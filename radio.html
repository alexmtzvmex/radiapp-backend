<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>RadiApp Radio</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<h1>RadiApp Canal General</h1>

<input type="text" id="usuario" placeholder="Tu nombre"><br><br>
<input type="number" id="canal" value="1"><br><br>

<button onclick="activarMicrofono()">1. Activar micrófono</button>
<button onclick="conectar()">2. Entrar al canal</button>

<hr>

<button
    onmousedown="iniciarPTT(event)"
    onmouseup="detenerPTT(event)"
    ontouchstart="iniciarPTT(event)"
    ontouchend="detenerPTT(event)"
    style="width:220px;height:220px;border-radius:110px;font-size:36px;background:red;color:white;"
>
PTT
</button>

<h2 id="estado">Desconectado</h2>
<div id="mensajes"></div>

<script>
const socket = io("https://radiapp-backend.onrender.com");

let stream = null;
let mediaRecorder = null;
let audioChunks = [];
let grabando = false;

async function activarMicrofono() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        estado("Micrófono activado");
    } catch (error) {
        alert("Error micrófono: " + error.message);
    }
}

function conectar() {
    const usuario = getUsuario();
    const canal = getCanal();

    socket.emit("entrar_canal", {
        canal_id: canal,
        usuario: usuario
    });

    estado("Conectado al canal " + canal);
}

async function iniciarPTT(event) {
    event.preventDefault();

    if (grabando) return;

    if (!stream) {
        await activarMicrofono();
    }

    audioChunks = [];

    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = function(event) {
        if (event.data.size > 0) {
            audioChunks.push(event.data);
        }
    };

    mediaRecorder.onstop = async function() {
        const audioBlob = new Blob(audioChunks, { type: "audio/webm" });

        const reader = new FileReader();

        reader.onloadend = function() {
            const base64Audio = reader.result.split(",")[1];

            socket.emit("audio_completo", {
                canal_id: getCanal(),
                usuario: getUsuario(),
                audio: base64Audio
            });

            mensaje("Audio enviado por " + getUsuario());
        };

        reader.readAsDataURL(audioBlob);
    };

    mediaRecorder.start();
    grabando = true;

    socket.emit("ptt_inicio", {
        canal_id: getCanal(),
        usuario: getUsuario()
    });

    estado(getUsuario() + " está hablando...");
}

function detenerPTT(event) {
    event.preventDefault();

    if (!grabando) return;

    grabando = false;

    if (mediaRecorder && mediaRecorder.state !== "inactive") {
        mediaRecorder.stop();
    }

    socket.emit("ptt_fin", {
        canal_id: getCanal(),
        usuario: getUsuario()
    });

    estado(getUsuario() + " dejó de hablar.");
}

socket.on("mensaje_canal", function(data) {
    mensaje(data.mensaje);
});

socket.on("ptt_estado", function(data) {
    estado(data.mensaje);
});

socket.on("audio_completo", function(data) {
    mensaje("Audio recibido de " + data.usuario);

    const audio = new Audio("data:audio/webm;base64," + data.audio);
    audio.controls = true;
    audio.autoplay = true;

    document.getElementById("mensajes").appendChild(audio);

    audio.play().catch(function(error) {
        mensaje("Presiona PLAY en el audio recibido. Error autoplay: " + error.message);
    });
});

function getUsuario() {
    return document.getElementById("usuario").value || "Usuario";
}

function getCanal() {
    return document.getElementById("canal").value || "1";
}

function estado(texto) {
    document.getElementById("estado").innerText = texto;
}

function mensaje(texto) {
    document.getElementById("mensajes").innerHTML += "<p>" + texto + "</p>";
}
</script>

</body>
</html>
